{% extends 'hospital/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - Hospital Information System{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0"><i class="bi bi-lock"></i> Login to Your Account</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_username" class="form-label">Email or Username</label>
                            <input type="text" name="username" id="id_username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="id_password" class="form-label">Password</label>
                            <input type="password" name="password" id="id_password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    <hr>
                    <p class="text-center mb-2">Don't have an account?</p>
                    <a href="{% url 'hospital:patient_register' %}" class="btn btn-outline-primary w-100 mb-2">Register as Patient</a>
                    <a href="{% url 'hospital:doctor_register' %}" class="btn btn-outline-primary w-100">Register as Doctor</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
